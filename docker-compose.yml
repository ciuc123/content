version: "3.8"
services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    # Ensure dependencies are installed on container start (works well with bind mounts)
    # If a copilot binary has been downloaded into the copilot_bin volume, symlink it into /usr/local/bin
    command: sh -c "if [ -f /opt/copilot/copilot ]; then ln -sf /opt/copilot/copilot /usr/local/bin/copilot || true; fi && npm install && npm run dev"
    env_file: .env.local
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
      - copilot_bin:/opt/copilot:ro
      - ~/.config/gh:/root/.config/gh:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
      copilot_boot:
        condition: service_completed_successfully
  copilot_boot:
    image: curlimages/curl:8.1.2
    user: "0"
    command: sh -c "set -eux; cd /work; ARCH=$(uname -m); if [ \"$$ARCH\" = \"aarch64\" ]; then file=\"copilot-linuxmusl-arm64.tar.gz\"; else file=\"copilot-linuxmusl-x64.tar.gz\"; fi; url=\"https://github.com/github/copilot-cli/releases/latest/download/$$file\"; echo \"Downloading $$file for $$ARCH (musl)\"; if curl -fSL -L \"$$url\" -o copilot.tar.gz 2>/dev/null; then tar -xzf copilot.tar.gz && chmod +x copilot && rm -f copilot.tar.gz && echo \"✓ Copilot CLI ready\" && exit 0; fi; echo \"Failed to download. Using manual mode.\"; exit 0"
    volumes:
      - copilot_bin:/work
    restart: "no"
volumes:
  pgdata:
  node_modules:
  copilot_bin:
