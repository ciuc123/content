version: "3.8"
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ideas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ideas}
      POSTGRES_DB: ${POSTGRES_DB:-ideas_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: npm run dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_TARGET_REPO: ${GITHUB_TARGET_REPO}
      DEV_AUTH_DISABLED: ${DEV_AUTH_DISABLED:-true}
      USE_LOCAL_KNOWLEDGE: ${USE_LOCAL_KNOWLEDGE:-true}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:

