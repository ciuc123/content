version: "3.8"
services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    # Ensure dependencies are installed on container start (works well with bind mounts)
    command: sh -c "npm install && npm run dev"
    env_file: .env.local
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:
  node_modules:
