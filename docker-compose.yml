version: "3.8"
services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    # Ensure dependencies are installed on container start (works well with bind mounts)
    # If a copilot binary has been downloaded into the copilot_bin volume, symlink it into /usr/local/bin
    command: sh -c "if [ -f /opt/copilot/copilot ]; then ln -sf /opt/copilot/copilot /usr/local/bin/copilot || true; fi && npm install && npm run dev"
    env_file: .env.local
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
      - copilot_bin:/opt/copilot:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
      copilot_boot:
        condition: service_completed_successfully
  copilot_boot:
    image: curlimages/curl:8.1.2
    entrypoint: ["sh","-c"]
    command: |
      set -eux;
      cd /work;
      # Try multiple platform-specific tar.gz archives (prefer x64, fallback to arm64)
      for file in copilot-linux-x64.tar.gz copilot-linux-arm64.tar.gz copilot-linuxmusl-x64.tar.gz copilot-linuxmusl-arm64.tar.gz; do
        url="https://github.com/github/copilot-cli/releases/latest/download/$file";
        echo "Trying $url";
        if curl -fSL "$url" -o copilot.tar.gz; then
          tar -xzf copilot.tar.gz;
          if [ -f copilot ]; then
            chmod +x copilot;
            rm -f copilot.tar.gz;
            exit 0;
          fi;
        fi;
      done;
      echo "No copilot binary found. Using manual provider instead.";
      exit 0
    volumes:
      - copilot_bin:/work
    restart: "no"
volumes:
  pgdata:
  node_modules:
  copilot_bin:
